name: glitter_list
description: "Glitter List — local-only multi-list todo."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_ce: ^2.11.0
  hive_ce_flutter: ^2.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Sniglet
      fonts:
        - asset: assets/fonts/Sniglet-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sniglet-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  # Use the full composite as the adaptive-icon background layer so
  # the launcher masks the whole icon to the device's shape (circle,
  # squircle, etc.) instead of applying the Android 8+ legacy-icon
  # "white circle with shrunken bitmap" fallback. Foreground is a
  # fully transparent PNG — we don't want a separate subject on top.
  adaptive_icon_background: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/transparent.png"
  min_sdk_android: 21
