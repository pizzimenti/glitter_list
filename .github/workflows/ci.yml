name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Unit + widget tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test

  integration:
    name: Integration tests (${{ matrix.mode }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # One emulator per brightness — splitting prevents the
      # emulator-exhaustion crashes seen when one job ran light + dark
      # back-to-back (the shared emulator died after ~5 apk
      # rebuild/install cycles, which is exactly one full goldens pass).
      # `night` matches the literal expected by `cmd uimode night`.
      matrix:
        include:
          - mode: light
            night: "no"
          - mode: dark
            night: "yes"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # KVM is available on ubuntu-24.04 runners; this exposes it to the
      # current user so the emulator can hardware-accelerate. Without it,
      # boot takes 15+ minutes and is prone to ANR.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run integration tests on emulator (${{ matrix.mode }})
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7 # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # NOTE: each line below runs as a separate `sh -c` invocation,
          # so multi-line shell constructs (if/then/else/fi, for-loops,
          # heredocs) silently break. Keep every line a self-contained
          # command. Matrix-dependent values come from `${{ matrix.* }}`
          # at workflow-eval time, not from runtime shell branching.
          script: |
            set -e
            adb shell "cmd uimode night ${{ matrix.night }}"
            sleep 2
            flutter test integration_test/goldens/ --update-goldens
            flutter test integration_test/
      - name: Upload regenerated goldens (${{ matrix.mode }})
        # TEMPORARY (paired with the --update-goldens block above):
        # surface the freshly captured PNGs as an artifact so they
        # can be downloaded and committed back to the repo.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: regenerated-goldens-${{ matrix.mode }}
          path: integration_test/goldens/goldens/*.png
          if-no-files-found: error
      - name: Upload golden failures (${{ matrix.mode }})
        # Runs only if a previous step failed, AND only when a failures
        # dir exists (matchesGoldenFile writes the actual-rendered PNG
        # there on a pixel mismatch). Uploaded as a workflow artifact so
        # the diff is inspectable from the GitHub UI without re-running
        # locally.
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-failures-${{ matrix.mode }}
          path: '**/failures/*.png'
          if-no-files-found: ignore
