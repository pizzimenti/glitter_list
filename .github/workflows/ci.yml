name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          # Pin the SDK version exactly. `channel: stable` floats and
          # caused the May 2026 drift cycle (1080×2400 → 1080×2337
          # capture-area regression). Bump intentionally with a known
          # PR boundary; do not let stable-channel updates in unattended.
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Unit + widget tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          # Pin the SDK version exactly. `channel: stable` floats and
          # caused the May 2026 drift cycle (1080×2400 → 1080×2337
          # capture-area regression). Bump intentionally with a known
          # PR boundary; do not let stable-channel updates in unattended.
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test

  integration:
    name: Integration tests (${{ matrix.suite }} / ${{ matrix.mode }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # One emulator per (test-suite, brightness) cell. Wider split
      # than just per-mode — the May 2026 SDK / system-image drift
      # made the runner emulator far less stable: it now dies after
      # ~7 apk install cycles, which is fewer than items_test +
      # lists_test + goldens combined (13 tests). Splitting by suite
      # caps each emulator's workload at ≤6 tests, well within the
      # observed stability window.
      # `night` matches the literal expected by `cmd uimode night`;
      # `path` is the test target. Listed exhaustively (rather than
      # using a cross product + include merges) so all six entries
      # are unambiguous on read.
      matrix:
        include:
          - mode: light
            suite: items
            night: "no"
            path: integration_test/items_test.dart
          - mode: light
            suite: lists
            night: "no"
            path: integration_test/lists_test.dart
          - mode: light
            suite: goldens
            night: "no"
            path: integration_test/goldens/
          - mode: dark
            suite: items
            night: "yes"
            path: integration_test/items_test.dart
          - mode: dark
            suite: lists
            night: "yes"
            path: integration_test/lists_test.dart
          - mode: dark
            suite: goldens
            night: "yes"
            path: integration_test/goldens/
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          # Pin the SDK version exactly. `channel: stable` floats and
          # caused the May 2026 drift cycle (1080×2400 → 1080×2337
          # capture-area regression). Bump intentionally with a known
          # PR boundary; do not let stable-channel updates in unattended.
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - run: flutter pub get
      # KVM is available on ubuntu-24.04 runners; this exposes it to the
      # current user so the emulator can hardware-accelerate. Without it,
      # boot takes 15+ minutes and is prone to ANR.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run integration tests on emulator (${{ matrix.mode }})
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7 # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # NOTE: each line below runs as a separate `sh -c` invocation,
          # so multi-line shell constructs (if/then/else/fi, for-loops,
          # heredocs) silently break. Keep every line a self-contained
          # command. Matrix-dependent values come from `${{ matrix.* }}`
          # at workflow-eval time, not from runtime shell branching.
          script: |
            set -e
            adb shell "cmd uimode night ${{ matrix.night }}"
            sleep 2
            ./tool/ci_flutter_test.sh ${{ matrix.path }}
      - name: Upload golden failures (${{ matrix.mode }})
        # Runs only if a previous step failed, AND only when a failures
        # dir exists (matchesGoldenFile writes the actual-rendered PNG
        # there on a pixel mismatch). Uploaded as a workflow artifact so
        # the diff is inspectable from the GitHub UI without re-running
        # locally.
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-failures-${{ matrix.suite }}-${{ matrix.mode }}
          path: '**/failures/*.png'
          if-no-files-found: ignore
